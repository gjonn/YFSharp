name: NuGet

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-pack:
    name: Build, test, pack
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore YFSharp.slnx

      - name: Build
        run: dotnet build YFSharp.slnx --configuration "$CONFIGURATION" --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test YFSharp.slnx --configuration "$CONFIGURATION" --no-build --verbosity normal

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail

          version_args=()
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            package_version="${GITHUB_REF_NAME#v}"
            if [[ ! "$package_version" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Release tags must look like v1.2.3 or v1.2.3-preview.1."
              exit 1
            fi

            version_args=(-p:PackageVersion="$package_version")
          fi

          dotnet pack src/YFSharp/YFSharp.csproj \
            --configuration "$CONFIGURATION" \
            --no-restore \
            --output "$PACKAGE_OUTPUT" \
            -p:ContinuousIntegrationBuild=true \
            "${version_args[@]}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: YFSharp-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*
          if-no-files-found: error

  publish:
    name: Publish to NuGet
    needs: build-test-pack
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: YFSharp-packages
          path: ${{ env.PACKAGE_OUTPUT }}

      - name: Validate NuGet trusted publishing configuration
        env:
          NUGET_USER: ${{ secrets.NUGET_USER }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_USER:-}" ]]; then
            echo "::error::Set the NUGET_USER repository secret to your nuget.org profile name, not your email address."
            exit 1
          fi

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        shell: bash
        run: |
          set -euo pipefail

          dotnet nuget push "$PACKAGE_OUTPUT"/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
